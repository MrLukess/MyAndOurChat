<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в MAOCS</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white;}
        .login-box { background: rgba(20,20,30,0.8); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #00d2ff; box-shadow: 0 0 30px rgba(0,210,255,0.3); backdrop-filter: blur(10px); width: 300px;}
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box;}
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; background: linear-gradient(45deg, #00d2ff, #3a7bd5);}
        button.register { background: linear-gradient(45deg, #8e44ad, #c0392b); }
        .checkbox-container { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin: 10px 0; font-size: 14px; color: #aaa;}
    </style>
</head>
<body>
    <div class="login-box">
        <h1 style="margin-top:0; color:#00d2ff; text-shadow:0 0 10px #00d2ff;">MAOCS</h1>
        <p style="color:gray; font-size:12px; margin-top:-15px;">My And Our ChatS</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Ваш никнейм" required>
            <input type="password" name="password" placeholder="Ваш пароль" required>
            
            <div class="checkbox-container">
                <input type="checkbox" name="remember" id="remember" checked>
                <label for="remember">Запомнить меня (14 дней)</label>
            </div>

            <button type="submit" name="action" value="login">Войти</button>
            <button type="submit" name="action" value="register" class="register">Зарегистрироваться</button>
        </form>
    </div>
</body>
</html>
