<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в чат</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background: #0088cc; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;}
        button[value="register"] { background: #28a745; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Добро пожаловать</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Придумайте Никнейм" required>
            <input type="password" name="password" placeholder="Ваш пароль" required>
            <button type="submit" name="action" value="login">Войти</button>
            <button type="submit" name="action" value="register">Зарегистрироваться</button>
        </form>
    </div>
</body>
</html>
