<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAOCS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; height: 100vh; display: flex; overflow: hidden; color: #fff; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); background-size: 400% 400%; animation: gradientBG 15s ease infinite;}
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar { width: 340px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1); z-index: 10; background: rgba(0,0,0,0.2);}
        .sidebar-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1);}
        .my-profile { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, #ff00cc, #333399); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 0 10px rgba(255,0,204,0.5); overflow: hidden; flex-shrink: 0;}
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .settings-btn { background: transparent; color: #fff; border: none; font-size: 24px; cursor: pointer; position: relative;}
        .settings-dot { position: absolute; top:-2px; right:-2px; width:12px; height:12px; background:#ff4757; border-radius:50%; display:none; box-shadow: 0 0 8px #ff4757;}

        .tabs-container { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; font-weight: bold; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s;}
        .tab-btn.active { color: #fff; border-bottom: 3px solid #00d2ff; text-shadow: 0 0 8px #00d2ff;}

        #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; transition: 0.2s; position: relative;}
        .chat-item:hover { background: rgba(255,255,255,0.1); }
        .chat-item.active { background: rgba(255,255,255,0.15); box-shadow: inset 3px 0 0 #00d2ff; }
        .chat-name { font-weight: 500; flex: 1; font-size: 16px;}
        .unread { background: #ff4757; color: white; border-radius: 12px; padding: 3px 8px; font-size: 11px; display: none; font-weight: bold;}
        .online-dot { width: 14px; height: 14px; background: #2ed573; border-radius: 50%; position: absolute; left: 45px; top: 40px; border: 2px solid #302b63; display: none; box-shadow: 0 0 5px #2ed573;}

        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative;}
        .header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.1); flex-wrap: wrap; gap: 10px;}
        .btn-action { border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; color:white; transition: 0.3s; background: rgba(255,255,255,0.15);}
        .btn-action:hover { background: rgba(255,255,255,0.25); }
        .btn-call { background: linear-gradient(45deg, #11998e, #38ef7d); box-shadow: 0 0 10px rgba(56,239,125,0.4); color:black;}
        .btn-danger { background: rgba(255, 71, 87, 0.8); }

        #chat { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg-row { display: flex; gap: 15px; border-radius: 12px; position: relative; max-width: 85%; align-items: flex-end;}
        .my-msg-row { align-self: flex-end; flex-direction: row-reverse;}
        .msg-content { display: flex; flex-direction: column; max-width: 100%;}
        .my-msg-row .msg-content { align-items: flex-end; }
        
        /* Исправление блока ответа (Укороченный текст) */
        .msg-reply-box { font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 5px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-left: 3px solid #00d2ff; border-radius: 6px; cursor: pointer; max-height: 40px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 100%; box-sizing:border-box;}
        
        .msg-bubble { background: rgba(255,255,255,0.1); padding: 12px 18px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word;}
        .my-msg-row .msg-bubble { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 3px; margin-left: 5px; margin-right: 5px;}
        
        /* Кнопка ответа */
        .reply-btn-msg { opacity: 0; position: absolute; right: -40px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size:18px; transition: 0.2s;}
        .my-msg-row .reply-btn-msg { right: auto; left: -40px; }
        .msg-row:hover .reply-btn-msg { opacity: 1; }

        .media-thumbnail { max-width: 250px; max-height: 250px; border-radius: 10px; margin-top: 5px; cursor: zoom-in; object-fit: cover;}
        
        .input-area { padding: 20px; display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05);}
        .input-area input[type="text"] { flex: 1; padding: 15px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; outline: none; font-size: 15px;}
        .input-area button { padding: 12px 25px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold;}

        /* ЭКРАН ВХОДА (Для звуков) */
        #audio-unlocker { position: fixed; z-index: 100000; top: 0; left: 0; width: 100%; height: 100%; background: #0f0c29; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; text-align:center;}
        
        .call-modal, .lightbox, .modal-bg { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; }
        .call-ringing { display: none; position: fixed; z-index: 10000; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,40,0.95); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #00d2ff;}
        .video-container { display: flex; gap: 20px; margin-bottom: 20px; width: 90%; justify-content: center; position: relative;}
        #remoteVideo { width: 100%; max-width: 900px; max-height: 70vh; background: #111; border-radius: 15px;}
        #localVideo { width: 220px; position: absolute; bottom: 20px; right: 20px; border: 3px solid #00d2ff; border-radius: 15px; z-index: 2; background: #000;}
        .lightbox img, .lightbox video { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .modal-box { background: rgba(20,20,30,0.95); padding: 30px; border-radius: 20px; width: 450px; border: 1px solid rgba(255,255,255,0.1);}
    </style>
</head>
<body>

    <!-- ЭКРАН ДЛЯ 100% ВЗЛОМА ЗВУКОВ БРАУЗЕРА -->
    <div id="audio-unlocker" onclick="unlockApp()">
        <h1 style="color:#00d2ff; font-size: 50px; margin:0;">MAOCS</h1>
        <h3 style="color:gray;">My And Our ChatS</h3>
        <p style="margin-top:30px; background: #2ed573; padding:15px 30px; border-radius:30px; font-weight:bold; color:black;">Кликните сюда, чтобы войти и включить звуки!</p>
    </div>

    <!-- АУДИО -->
    <audio id="notifSound" src="https://actions.google.com/sounds/v1/water/water_drop.ogg" preload="auto"></audio>
    <audio id="ringtone" src="https://actions.google.com/sounds/v1/alarms/phone_ringing.ogg" preload="auto" loop></audio>

    <div class="sidebar glass-panel">
        <div class="sidebar-header">
            <div class="my-profile">
                <input type="file" id="avatarUpload" style="display: none;" accept="image/*">
                <div class="avatar" onclick="document.getElementById('avatarUpload').click()">
                    {% if avatar %} <img src="{{ avatar }}"> {% else %} {{ username[0] | upper }} {% endif %}
                </div>
                <div style="font-weight: bold; font-size: 18px;">{{ username }}</div>
            </div>
            <button class="settings-btn" onclick="openSettings()">⚙️<div class="settings-dot" id="req-dot"></div></button>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" id="tab-pm" onclick="switchTab('pm')">Личные</button>
            <button class="tab-btn" id="tab-group" onclick="switchTab('group')">Группы</button>
        </div>

        <div style="padding:15px;">
            <input type="text" id="searchInput" placeholder="Поиск чатов..." onkeyup="filterChats()" style="width:100%; padding:10px; border-radius:10px; border:none; background:rgba(0,0,0,0.4); color:white; outline:none; box-sizing:border-box;">
        </div>
        <div id="chat-list"></div>
    </div>

    <div class="chat-container">
        <div class="header glass-panel">
            <div>
                <span id="chat-title" style="font-size: 20px; font-weight: bold;">MAOCS</span>
                <div id="chat-status" style="font-size: 13px; color: rgba(255,255,255,0.6);">Выберите беседу</div>
            </div>
            <!-- СЮДА БУДУТ ДОБАВЛЯТЬСЯ КНОПКИ -->
            <div id="chat-actions" style="display: none; gap: 5px; flex-wrap: wrap;"></div>
        </div>
        
        <div id="chat"></div>

        <div class="replying-indicator" id="reply-banner" style="display:none; background:rgba(0,0,0,0.4); padding:10px 20px; justify-content:space-between; align-items:center;">
            <div id="reply-content-box" style="display:flex; align-items:center; gap:10px;"></div>
            <span style="cursor:pointer; font-size:24px;" onclick="cancelReply()">&times;</span>
        </div>

        <div class="input-area glass-panel">
            <input type="file" id="fileInput" style="display: none;">
            <button onclick="document.getElementById('fileInput').click()" style="background:rgba(255,255,255,0.1); border-radius:50%; width:45px; height:45px; padding:0; font-size:20px;">➕</button>
            <input type="text" id="msgInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button onclick="sendMsg()">Отправить</button>
        </div>
    </div>

    <!-- ОКНО НАСТРОЕК (ЯЗЫКИ И ПЕРЕВОДЧИК) -->
    <div id="settings-modal" class="modal-bg" onclick="closeModals(event)">
        <div class="modal-box">
            <h2 style="margin-top:0;">⚙️ Настройки MAOCS</h2>
            
            <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin-bottom:15px;">
                <label style="font-weight:bold; color:#00d2ff;">Язык перевода:</label><br>
                <select id="targetLang" style="width:100%; padding:10px; margin-top:5px; border-radius:5px; background:#24243e; color:white; border:1px solid gray;" onchange="saveLang()">
                    <option value="ru">Русский</option>
                    <option value="uk">Украинский</option>
                    <option value="en">Английский</option>
                    <option value="it">Итальянский</option>
                    <option value="ja">Японский</option>
                    <option value="pl">Польский</option>
                    <option value="be">Белорусский</option>
                </select>
                <br><br>
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="autoTranslate" onchange="saveLang()" style="width:20px; height:20px;">
                    <b>Авто-перевод всех сообщений</b>
                </label>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn-action" onclick="addFriend()" style="background:#00d2ff; color:black; width:100%;">Добавить друга</button>
                <button class="btn-action" onclick="createGroup()" style="background:#8e44ad; width:100%;">Создать группу</button>
            </div>
            
            <h3 style="color:#00d2ff; margin-bottom:5px;">📩 Заявки</h3>
            <div id="requests-container" style="max-height: 120px; overflow-y:auto; margin-bottom:15px;"></div>
            
            <h3 style="color:#ff4757; margin-bottom:5px;">🚫 Чёрный список</h3>
            <div id="blocked-list" style="max-height: 100px; overflow-y:auto; margin-bottom:20px;"></div>
            
            <button class="btn-action" style="width:100%; padding:12px; background:#ff4757;" onclick="window.location.href='/logout'">🚪 Выйти из аккаунта</button>
        </div>
    </div>

    <div id="call-ringing" class="call-ringing">
        <h2 id="caller-name" style="color:white;">Входящий звонок...</h2>
        <div style="display:flex; gap:20px; justify-content:center; margin-top:30px;">
            <button onclick="acceptCall()" style="background:#2ed573; color:white; border:none; padding:15px 30px; border-radius:30px; cursor:pointer; font-weight:bold;">Принять 📞</button>
            <button onclick="rejectCall()" style="background:#ff4757; color:white; border:none; padding:15px 30px; border-radius:30px; cursor:pointer; font-weight:bold;">Отклонить ✖</button>
        </div>
    </div>

    <div id="call-modal" class="call-modal">
        <h2 id="call-status" style="margin-bottom:10px;">Звонок...</h2>
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div style="display:flex; gap:20px; margin-top:15px;">
            <button onclick="toggleMute()" class="btn-action" id="btn-mute" style="padding:15px 25px; border-radius:30px;">🎤 Вкл</button>
            <button onclick="toggleVideo()" class="btn-action" id="btn-video" style="padding:15px 25px; border-radius:30px; background:#ff4757;">📷 Выкл</button>
            <button onclick="endCall()" style="background:#ff4757; color:white; border:none; padding:15px 25px; border-radius:30px; cursor:pointer; font-weight:bold;">Завершить 📞</button>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox(event)" style="position:absolute; top:20px; right:40px; font-size:40px; color:white; cursor:pointer;">&times;</span>
        <img id="lb-img" src="" style="display:none;">
        <video id="lb-vid" src="" controls style="display:none;"></video>
    </div>

    <script>
        // --- 100% ВЗЛОМ ЗВУКОВ ---
        function unlockApp() {
            let n = document.getElementById('notifSound'); let r = document.getElementById('ringtone');
            n.volume = 0; n.play().then(()=>{ n.pause(); n.currentTime=0; n.volume=0.4; }).catch(()=>{});
            r.volume = 0; r.play().then(()=>{ r.pause(); r.currentTime=0; r.volume=0.3; }).catch(()=>{});
            document.getElementById('audio-unlocker').style.display = 'none';
        }
        function playSound(id) { let a = document.getElementById(id); a.currentTime = 0; a.play().catch(()=>{}); }

        // --- ПЕРЕВОДЧИК В БРАУЗЕРЕ (0 НАГРУЗКИ НА СЕРВЕР) ---
        let appLang = localStorage.getItem('maocs_lang') || 'ru';
        let autoTranslate = localStorage.getItem('maocs_trans') === 'true';
        document.getElementById('targetLang').value = appLang;
        document.getElementById('autoTranslate').checked = autoTranslate;

        function saveLang() {
            appLang = document.getElementById('targetLang').value;
            autoTranslate = document.getElementById('autoTranslate').checked;
            localStorage.setItem('maocs_lang', appLang);
            localStorage.setItem('maocs_trans', autoTranslate);
            if(currentRoom) openChat(currentRoom, document.getElementById('chat-title').innerText); // Перезагрузить чат
        }

        async function translateText(text) {
            if(!autoTranslate) return text;
            try {
                let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${appLang}&dt=t&q=${encodeURI(text)}`);
                let json = await res.json();
                return json[0][0][0]; // Быстрый бесплатный ответ Google
            } catch(e) { return text; }
        }

        // --- ОСНОВНОЕ ---
        const socket = io();
        const myUsername = "{{ username }}";
        const chatDiv = document.getElementById('chat');
        let currentRoom = null; let onlineUsers = new Set(); let allChats =[]; let currentTab = 'pm'; let unreadData = {};
        let repId = '', repType = 'text', repContent = '', repUser = '', repText = '';

        // WebRTC
        let localStream, peerConnection, currentCallRoom;
        const iceServers = { iceServers:[{ urls: 'stun:stun.l.google.com:19302' }] };
        window.onfocus = () => { document.title = "MAOCS"; };

        fetch('/get_online_users').then(r=>r.json()).then(users => { users.forEach(u => onlineUsers.add(u)); loadRequests(); loadSidebar(); });
        socket.on('user_status', function(data) { if(data.online) onlineUsers.add(data.username); else onlineUsers.delete(data.username); updateUI(); });
        socket.on('new_friend_req', loadRequests);

        function loadRequests() {
            fetch('/get_requests').then(r=>r.json()).then(reqs => {
                let html = '';
                reqs.forEach(sender => { html += `<div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between;"><span><b>${sender}</b></span><div><button onclick="answerReq('${sender}', 'accept')" style="background:#2ed573; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">✔️</button> <button onclick="answerReq('${sender}', 'reject')" style="background:#ff4757; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">✖</button></div></div>`; });
                document.getElementById('requests-container').innerHTML = html || '<span style="color:gray;">Нет новых заявок</span>';
                document.getElementById('req-dot').style.display = reqs.length > 0 ? 'block' : 'none';
            });
        }
        function answerReq(s, a) { fetch('/answer_request', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sender:s, action:a}) }).then(()=>{ loadRequests(); loadSidebar(); }); }
        function addFriend() { let t = prompt("Ник пользователя:"); if (t) fetch('/send_friend_req', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({target:t}) }).then(r=>r.json()).then(d=>alert(d.msg||d.error)); }
        function createGroup() { let t = prompt("Название группы:"); if (t) fetch('/add_group', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({target:t}) }).then(r=>r.json()).then(d=>{ loadSidebar(); setTimeout(()=>openChat(d.room_id, d.room_name),300); }); }
        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; fetch('/get_blocked').then(r=>r.json()).then(users => { let html = users.length === 0 ? '<span style="color:gray;">Список пуст</span>' : ''; users.forEach(u => html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; padding:10px; background:rgba(255,255,255,0.1); border-radius:8px;"><span>${u}</span> <button onclick="unblock('${u}')" class="btn-action">Разблокировать</button></div>`); document.getElementById('blocked-list').innerHTML = html; }); }
        function unblock(u) { fetch('/unblock_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({target: u}) }).then(() => openSettings()); }
        function closeModals(e) { if(e.target.classList.contains('modal-bg')) e.target.style.display = 'none'; }
        function filterChats() { let f = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('.chat-item').forEach(el => { el.style.display = el.querySelector('.chat-name').innerText.toLowerCase().includes(f) ? 'flex' : 'none'; }); }
        function switchTab(tab) { currentTab = tab; document.getElementById('tab-pm').classList.remove('active'); document.getElementById('tab-group').classList.remove('active'); document.getElementById('tab-' + tab).classList.add('active'); renderChats(); }

        function loadSidebar() {
            fetch('/my_chats').then(r => r.json()).then(chats => {
                allChats = chats; allChats.forEach(c => socket.emit('join', { room: c.id })); renderChats();
                if (!currentRoom) { let first = allChats.find(c => !c.id.startsWith('group_') && c.id !== 'global'); if (first) openChat(first.id, first.name); }
            });
        }

        function renderChats() {
            const list = document.getElementById('chat-list'); list.innerHTML = '';
            let filtered = allChats.filter(chat => currentTab === 'group' ? (chat.id.startsWith('group_') || chat.id === 'global') : (!chat.id.startsWith('group_') && chat.id !== 'global'));
            filtered.forEach(chat => {
                let div = document.createElement('div'); div.className = 'chat-item ' + (currentRoom === chat.id ? 'active' : '');
                let av = chat.avatar ? `<img src="${chat.avatar}">` : `${chat.id === 'global' ? '🌍' : (chat.id.startsWith('group_') ? '👥' : chat.name.charAt(0).toUpperCase())}`;
                div.innerHTML = `<div class="avatar">${av}</div><div class="online-dot" id="dot-${chat.id}"></div><span class="chat-name">${chat.name}</span><span class="unread" id="unread-${chat.id}" style="${unreadData[chat.id] ? 'display:block;' : 'display:none;'}">Новое</span>`;
                div.onclick = () => openChat(chat.id, chat.name); list.appendChild(div);
            }); updateUI();
        }

        function updateUI() {
            allChats.forEach(chat => { let dot = document.getElementById('dot-'+chat.id); if (dot) dot.style.display = (chat.target_user && onlineUsers.has(chat.target_user)) ? 'block' : 'none'; });
            if (currentRoom && !currentRoom.startsWith('group_') && currentRoom !== 'global') { let chat = allChats.find(c => c.id === currentRoom); document.getElementById('chat-status').innerText = (chat && chat.target_user && onlineUsers.has(chat.target_user)) ? '🟢 В сети' : '⚪ Не в сети'; } else document.getElementById('chat-status').innerText = '';
        }

        // --- ВОЗВРАЩЕНИЕ ВСЕХ КНОПОК ---
        function openChat(roomID, roomName) {
            currentRoom = roomID; document.getElementById('chat-title').innerText = roomName; unreadData[roomID] = false; cancelReply(); renderChats(); 
            
            // Собираем кнопки действий
            let actions = `<button class="btn-action btn-call" onclick="startCall()">📞 Звонок</button>`;
            let currentChat = allChats.find(c => c.id === roomID);
            
            if (roomID.startsWith('group_')) {
                actions += `<button class="btn-action" onclick="inviteToGroup()">+ Добавить</button>`;
                actions += `<button class="btn-action btn-danger" onclick="leaveGroup()">Выйти</button>`;
                if (currentChat && currentChat.is_creator) {
                    actions += `<button class="btn-action" onclick="manageGroup()" style="background:#8e44ad;">Участники</button>`;
                    actions += `<button class="btn-action btn-danger" onclick="deleteGroup()">Удалить группу</button>`;
                }
            } else if (roomID !== 'global') {
                actions += `<button class="btn-action" onclick="unfriend()">Удалить из друзей</button>`;
                actions += `<button class="btn-action btn-danger" onclick="blockUser()">🚫 Заблокировать</button>`;
            }
            
            document.getElementById('chat-actions').innerHTML = actions; 
            document.getElementById('chat-actions').style.display = 'flex';
            
            chatDiv.innerHTML = ''; 
            fetch('/history/' + currentRoom).then(r => r.json()).then(async msgs => { 
                for (let msg of msgs) { await displayMessage(msg); }
                chatDiv.scrollTop = chatDiv.scrollHeight; 
            });
        }

        function inviteToGroup() { let u = prompt("Ник друга:"); if(u) fetch('/invite_group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({room_id: currentRoom, target: u}) }).then(r=>r.json()).then(d=>{if(d.error)alert(d.error);}); }
        function manageGroup() { let action = prompt("ВЫГНАТЬ: kick ИМЯ\nЗАБАНИТЬ: ban ИМЯ"); if(!action) return; let parts = action.trim().split(' '); if (parts.length < 2) return; fetch('/kick_ban_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({room_id: currentRoom, target: parts.slice(1).join(' '), action: parts[0].toLowerCase()}) }).then(r=>r.json()).then(d=>{if(d.error)alert(d.error);}); }
        function unfriend() { if(confirm("Удалить из друзей?")) fetch('/unfriend', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({target: allChats.find(c => c.id === currentRoom).target_user}) }).then(() => { currentRoom = null; loadSidebar(); }); }
        function blockUser() { if(confirm("Заблокировать?")) fetch('/block_user', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({target: allChats.find(c => c.id === currentRoom).target_user}) }).then(() => { currentRoom = null; loadSidebar(); }); }
        function leaveGroup() { if(confirm("Выйти?")) fetch('/leave_group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({room_id: currentRoom}) }).then(() => { currentRoom = null; loadSidebar(); }); }
        function deleteGroup() { if(confirm("Удалить группу?")) fetch('/delete_group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({room_id: currentRoom}) }).then(r=>r.json()).then(res => { if(res.error) alert(res.error); }); }

        // --- ИСПРАВЛЕННЫЙ БЛОК ОТВЕТОВ ---
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/'/g, "&#39;").replace(/"/g, "&quot;"); }
        function linkify(text) { return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#00d2ff; text-decoration:underline;">$1</a>'); }

        function setReply(id, type, content, user, text) { 
            repId = id; repType = type; repContent = content; repUser = user; repText = text; 
            let box = `<b style="color:#00d2ff;">Ответ ${user}:</b> `;
            if(type === 'image') box += `<img src="${content}" class="msg-reply-thumb">`;
            else if(type === 'video') box += `<i>🎥 Видео</i>`;
            else if(type === 'file') box += `<i>📎 Файл</i>`;
            else box += `<i>${text}</i>`; // Текст уже обрезается через CSS text-overflow
            document.getElementById('reply-content-box').innerHTML = box;
            document.getElementById('reply-banner').style.display = 'flex'; document.getElementById('msgInput').focus(); 
        }
        function cancelReply() { repId = ''; repType = 'text'; repContent = ''; repUser = ''; repText = ''; document.getElementById('reply-banner').style.display = 'none'; }
        function scrollToMsg(id) { let el = document.getElementById('msg-' + id); if(el) { el.scrollIntoView({behavior: 'smooth', block: 'center'}); el.style.background = 'rgba(0, 210, 255, 0.3)'; setTimeout(() => el.style.background = 'transparent', 1500); } }

        socket.on('receive_message', async function(msg) { 
            if (msg.room === currentRoom) { await displayMessage(msg); chatDiv.scrollTop = chatDiv.scrollHeight; }
            else { unreadData[msg.room] = true; document.title = "🔔 Новое сообщение!"; renderChats(); playSound('notifSound'); }
        });
        socket.on('chat_invited', function(data) { if(data.room_id === 'none' && currentRoom !== 'global') { currentRoom = null; } loadSidebar(); });
        socket.on('group_deleted', function(data) { if (currentRoom === data.room_id) { currentRoom = null; chatDiv.innerHTML = '<i style="color:#ff4757;">Группа удалена.</i>'; document.getElementById('chat-actions').style.display = 'none';} loadSidebar(); });

        function formatTime(ts) {
            if(!ts) return "";
            let d = new Date(ts * 1000);
            return d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit', day:'numeric', month:'short'});
        }

        async function displayMessage(msg) {
            let div = document.createElement('div'); let isMe = msg.username === myUsername; div.id = 'msg-' + msg.msg_id;
            if (msg.type === 'system') { div.className = 'msg-system'; div.innerText = msg.content; div.style.alignSelf="center"; div.style.color="gray"; div.style.fontSize="12px"; chatDiv.appendChild(div); return; }

            div.className = 'msg-row ' + (isMe ? 'my-msg-row' : '');
            let av = !isMe ? `<div class="avatar" style="width:35px;height:35px; flex-shrink:0;">${msg.avatar ? `<img src="${msg.avatar}">` : msg.username.charAt(0).toUpperCase()}</div>` : '';
            
            let replyHtml = '';
            if (msg.reply_id) {
                let rc = msg.reply_type === 'image' ? `<img src="${msg.reply_content}" style="height:25px; border-radius:3px; margin-left:5px; vertical-align:middle;">` : (msg.reply_type === 'video' ? `🎥 Видео` : (msg.reply_type === 'file' ? `📎 Файл` : `<i>${escapeHtml(msg.reply_text)}</i>`));
                replyHtml = `<div class="msg-reply-box" onclick="scrollToMsg('${msg.reply_id}')">↪ <b style="margin-right:5px;">${msg.reply_user}:</b> ${rc}</div>`;
            }
            
            let contentHtml = `<div class="msg-content">`;
            if(!isMe) contentHtml += `<span style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:3px; margin-left:5px;">${msg.username}</span>`;
            
            // ПЕРЕВОДЧИК СООБЩЕНИЙ
            let finalContent = msg.content;
            if (msg.type === 'text' && !isMe) finalContent = await translateText(msg.content);

            contentHtml += `${replyHtml}<div class="msg-bubble">`;
            if (msg.type === 'text') contentHtml += linkify(escapeHtml(finalContent));
            else if (msg.type === 'image') contentHtml += `<img src="${msg.content}" class="media-thumbnail" onclick="openLightbox('${msg.content}', 'image')">`;
            else if (msg.type === 'video') contentHtml += `<video src="${msg.content}" class="media-thumbnail" onclick="openLightbox('${msg.content}', 'video')"></video>`;
            else if (msg.type === 'file') contentHtml += `<a href="${msg.content}" target="_blank" style="color:#00d2ff;">📎 Скачать файл</a>`;
            contentHtml += `</div><div class="msg-time">${formatTime(msg.timestamp)}</div></div>`;
            
            let safeReplyText = msg.type === 'text' ? escapeHtml(msg.content) : 'Медиа';
            let replyBtn = `<button class="reply-btn-msg" onclick="setReply('${msg.msg_id}', '${msg.type}', '${msg.content}', '${msg.username}', '${safeReplyText}')">↩</button>`;
            
            div.innerHTML = av + contentHtml + replyBtn; chatDiv.appendChild(div);
        }

        function openLightbox(src, type) { document.getElementById('lightbox').style.display = 'flex'; let img = document.getElementById('lb-img'); let vid = document.getElementById('lb-vid'); img.style.display = 'none'; vid.style.display = 'none'; if(type === 'image') { img.src = src; img.style.display = 'block'; } else { vid.src = src; vid.style.display = 'block'; vid.play(); } }
        function closeLightbox(e) { if(e.target.tagName !== 'DIV' && e.target.className !== 'lightbox-close') return; document.getElementById('lightbox').style.display = 'none'; document.getElementById('lb-vid').pause(); }

        function sendMsg() { let i = document.getElementById('msgInput'); if (i.value.trim() !== "") { socket.emit('send_message', { content: i.value, room: currentRoom, reply_user: repUser, reply_text: repText, reply_id: repId, reply_type: repType, reply_content: repContent }); i.value = ''; cancelReply(); } }
        document.getElementById('msgInput').addEventListener('keypress', function(e) { if(e.key === 'Enter') sendMsg(); });
        
        document.getElementById('fileInput').addEventListener('change', function() {
            if (this.files.length === 0 || !currentRoom) return;
            let tempMsg = {msg_id:'temp', username: myUsername, type:'system', content: '⏳ Загрузка в облако...', timestamp: Date.now()/1000}; displayMessage(tempMsg); chatDiv.scrollTop = chatDiv.scrollHeight;
            const fd = new FormData(); fd.append('file', this.files[0]); fd.append('room', currentRoom); fd.append('reply_user', repUser); fd.append('reply_text', repText); fd.append('reply_id', repId); fd.append('reply_type', repType); fd.append('reply_content', repContent);
            fetch('/upload', { method: 'POST', body: fd }).then(r=>r.json()).then(d=>{ let tm=document.getElementById('msg-temp'); if(tm) tm.remove(); if(!d.success) alert("Ошибка загрузки!"); this.value=''; cancelReply(); });
        });
        document.getElementById('avatarUpload').addEventListener('change', function() { if (this.files.length === 0) return; alert("Загрузка аватара..."); const fd = new FormData(); fd.append('file', this.files[0]); fetch('/upload_avatar', { method:'POST', body: fd }).then(()=>window.location.reload()); });

        // --- ЗВОНКИ ---
        async function getMedia(isVideoEnabled = false) { 
            try { 
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); 
                localStream.getVideoTracks()[0].enabled = isVideoEnabled; document.getElementById('localVideo').srcObject = localStream; 
                return true; 
            } catch (err) { alert("Ошибка камеры! Нужен HTTPS."); return false; } 
        }
        
        function startCall() { currentCallRoom = currentRoom; document.getElementById('call-modal').style.display = 'flex'; document.getElementById('call-status').innerText = "Звоним..."; getMedia(false).then((success) => { if(success) socket.emit('call_user', {room: currentRoom}); else endCallUI(); }); }
        socket.on('incoming_call', function(data) { currentCallRoom = data.room; document.getElementById('caller-name').innerText = `Звонок от ${data.from}...`; document.getElementById('call-ringing').style.display = 'block'; playSound('ringtone'); });
        function rejectCall() { document.getElementById('ringtone').pause(); document.getElementById('call-ringing').style.display = 'none'; socket.emit('call_response', {room: currentCallRoom, accepted: false}); currentCallRoom = null; }
        function acceptCall() { document.getElementById('ringtone').pause(); document.getElementById('call-ringing').style.display = 'none'; document.getElementById('call-modal').style.display = 'flex'; document.getElementById('call-status').innerText = "Соединение..."; getMedia(false).then((success) => { if(success) { socket.emit('call_response', {room: currentCallRoom, accepted: true}); createPeerConnection(); } else { socket.emit('call_response', {room: currentCallRoom, accepted: false}); endCallUI(); } }); }
        socket.on('call_response', function(data) { if(!data.accepted) { endCallUI(); alert("Отклонен"); } else { document.getElementById('call-status').innerText = "На связи 🟢"; createPeerConnection(); peerConnection.createOffer().then(offer => { peerConnection.setLocalDescription(offer); socket.emit('webrtc_signal', {room: currentCallRoom, sdp: offer}); }); } });
        function createPeerConnection() { peerConnection = new RTCPeerConnection(iceServers); localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream)); peerConnection.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; }; peerConnection.onicecandidate = (event) => { if (event.candidate) socket.emit('webrtc_signal', {room: currentCallRoom, candidate: event.candidate}); }; }
        socket.on('webrtc_signal', async function(data) { if(!peerConnection) return; if(data.sdp) { await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp)); if(data.sdp.type === 'offer') { document.getElementById('call-status').innerText = "На связи 🟢"; let answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer); socket.emit('webrtc_signal', {room: currentCallRoom, sdp: answer}); } } else if (data.candidate) { peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } else if (data.end_call) { endCallUI(); } });
        
        function toggleMute() { let t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled; document.getElementById('btn-mute').innerText = t.enabled ? "🎤 Вкл" : "🎤 Выкл"; document.getElementById('btn-mute').style.background = t.enabled ? "rgba(255,255,255,0.2)" : "#ff4757"; }
        function toggleVideo() { let t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled; document.getElementById('btn-video').innerText = t.enabled ? "📷 Вкл" : "📷 Выкл"; document.getElementById('btn-video').style.background = t.enabled ? "rgba(255,255,255,0.2)" : "#ff4757"; }
        function endCall() { socket.emit('webrtc_signal', {room: currentCallRoom, end_call: true}); endCallUI(); }
        function endCallUI() { document.getElementById('ringtone').pause(); document.getElementById('call-modal').style.display = 'none'; if(peerConnection) { peerConnection.close(); peerConnection = null; } if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; } document.getElementById('remoteVideo').srcObject = null; document.getElementById('localVideo').srcObject = null; currentCallRoom = null; document.getElementById('btn-video').innerText = "📷 Выкл"; document.getElementById('btn-video').style.background = "#ff4757"; document.getElementById('btn-mute').innerText = "🎤 Вкл"; document.getElementById('btn-mute').style.background = "rgba(255,255,255,0.2)"; }
    </script>
</body>
</html>
